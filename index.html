<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Donuts!</h1>

    <form id="donut-form">
      <hr />
      <label>
        Order a Donut
        <select name="type">
          <option value="glazed">Glazed Donut</option>
          <option value="jelly">Jelly Donut</option>
          <option value="boston">Boston Cream</option>
          <option value="strawberry">Strawberry and Sprinkles!</option>
          <option value="chocolate">Full Chocolate Donut</option>
          <option value="maple">Maple Bacon Crossaint Donut</option>
        </select>
      </label>
      <button type="submit">Order</button>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      var donutImages = {
        glazed: "https://daylightdonutsstgeorge.com/wp-content/uploads/2023/06/Raised-Glazed.jpg",
        jelly: "https://static01.nyt.com/images/2014/12/14/magazine/14eat4/14eat4-superJumbo.jpg",
        boston: "https://i0.wp.com/www.onegreenplanet.org/wp-content/uploads/2020/03/screen-shot-2020-03-30-at-12-35-21-pm.png?fit=763%2C657&ssl=1",
        strawberry: "https://static.vecteezy.com/system/resources/previews/072/371/086/non_2x/pink-strawberry-doughnut-topped-with-rainbow-sprinkles-a-neat-bite-mark-showing-fluffy-crumb-inside-light-glossy-surface-isolated-on-transparent-background-png.png",
        chocolate: "https://d1w7312wesee68.cloudfront.net/55cuM2DobLPzHPfeRExR9QlgY9b9zoeCXoqana3_rDI/resize:fit:720:720/plain/s3://toasttab/menu_service/restaurants/2ee15038-81bd-41f9-8241-fed527d21fe0/MenuItem/3098769c-084e-449e-861e-99ebd6ced0e9.png",
        maple:"https://goldbelly.imgix.net/uploads/showcase_media_asset/image/132762/maple-glazed-bacon-croissant-donuts-9-pack.8cf304b4b962943ce0b92d75467faa0a.jpg?ixlib=react-9.10.0&ar=1%3A1&fit=crop&w=3840&auto=format",
      };

      $("#donut-form").on("submit", function (event) {
        event.preventDefault();

    var $donutType = $(this).find("[name=type]"); 

    var donutType =  $donutType.val();
    
    var $img = $("<img>");
    $img.width(100);
    $img.attr("src", donutImages[donutType]);
    $img.appendTo("body");

    

        
        
        
        
      });
    </script>
  </body>
</html>
